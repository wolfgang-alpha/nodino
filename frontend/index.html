<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nodino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="top-bar">
        <button id="todo-toggle">view</button>
        <button id="add-btn">+ add</button>
    </div>

    <div id="add-popup" class="add-popup">
        <input type="text" id="add-task-input" placeholder="what needs to be done?" autocomplete="off">
        <div class="add-popup-row">
            <span class="add-label">importance</span>
            <div class="importance-picker" id="add-importance">
                <button data-val="1" class="imp-btn">1</button>
                <button data-val="2" class="imp-btn">2</button>
                <button data-val="3" class="imp-btn active">3</button>
                <button data-val="4" class="imp-btn">4</button>
                <button data-val="5" class="imp-btn">5</button>
            </div>
        </div>
        <button id="add-submit" class="add-submit">add task</button>
    </div>

    <div id="kanban-board">
        <div class="kanban-column" data-status="todo">
            <div class="kanban-column-header"><span class="status-dot todo"></span>To Do <span class="kanban-column-count">0</span></div>
            <div class="kanban-cards"></div>
        </div>
        <div class="kanban-column" data-status="in_progress">
            <div class="kanban-column-header"><span class="status-dot in_progress"></span>In Progress <span class="kanban-column-count">0</span></div>
            <div class="kanban-cards"></div>
        </div>
        <div class="kanban-column" data-status="waiting">
            <div class="kanban-column-header"><span class="status-dot waiting"></span>Waiting <span class="kanban-column-count">0</span></div>
            <div class="kanban-cards"></div>
        </div>
        <div class="kanban-column" data-status="done">
            <div class="kanban-column-header"><span class="status-dot done"></span>Done <span class="kanban-column-count">0</span></div>
            <div class="kanban-cards"></div>
        </div>
    </div>

    <div id="todo-list">
        <div class="todo-section" data-status="in_progress">
            <div class="todo-section-header"><span class="status-dot in_progress"></span>In Progress <span class="todo-section-count">0</span></div>
            <div class="todo-items"></div>
        </div>
        <div class="todo-section" data-status="todo">
            <div class="todo-section-header"><span class="status-dot todo"></span>To Do <span class="todo-section-count">0</span></div>
            <div class="todo-items"></div>
        </div>
    </div>

<script>
const kanbanBoard = document.getElementById('kanban-board');
const todoToggle = document.getElementById('todo-toggle');
const todoList = document.getElementById('todo-list');
const addBtn = document.getElementById('add-btn');
const addPopup = document.getElementById('add-popup');
const addTaskInput = document.getElementById('add-task-input');
const addImportance = document.getElementById('add-importance');
const addSubmit = document.getElementById('add-submit');

let todoVisible = false;
let addPopupOpen = false;
let newTaskImportance = 3;

// --- Add task popup ---

addBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    addPopupOpen = !addPopupOpen;
    addPopup.classList.toggle('visible', addPopupOpen);
    addBtn.classList.toggle('active', addPopupOpen);
    if (addPopupOpen) setTimeout(() => addTaskInput.focus(), 50);
});

function closeAddPopup() {
    addPopupOpen = false;
    addPopup.classList.remove('visible');
    addBtn.classList.remove('active');
}

addImportance.addEventListener('click', (e) => {
    if (!e.target.classList.contains('imp-btn')) return;
    newTaskImportance = parseInt(e.target.dataset.val);
    addImportance.querySelectorAll('.imp-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.val === String(newTaskImportance));
    });
});

async function submitTask() {
    const content = addTaskInput.value.trim();
    if (!content) return;
    addTaskInput.value = '';
    closeAddPopup();

    try {
        await fetch('/api/knots', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content, type: 'task', importance: newTaskImportance })
        });
        if (todoVisible) loadTodo();
        else loadKanban();
    } catch (err) {
        console.error('create error:', err);
    }
}

addSubmit.addEventListener('click', submitTask);
addTaskInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitTask();
    if (e.key === 'Escape') closeAddPopup();
});
addPopup.addEventListener('click', (e) => e.stopPropagation());

// --- Load kanban ---

async function loadKanban() {
    try {
        const res = await fetch('/api/knots?type=task&limit=200');
        const tasks = await res.json();
        if (!tasks) return;

        kanbanBoard.querySelectorAll('.kanban-cards').forEach(col => col.innerHTML = '');

        tasks.forEach(task => {
            const status = task.status || 'todo';
            const column = kanbanBoard.querySelector(`.kanban-column[data-status="${status}"] .kanban-cards`);
            if (column) column.appendChild(createKanbanCard(task));
        });

        kanbanBoard.querySelectorAll('.kanban-column').forEach(col => {
            const count = col.querySelector('.kanban-cards').children.length;
            col.querySelector('.kanban-column-count').textContent = count;
        });
    } catch (e) {
        console.error('kanban load error:', e);
    }
}

function createKanbanCard(task) {
    const card = document.createElement('div');
    card.className = 'kanban-card';
    card.draggable = true;
    card.dataset.id = task.id;

    const dots = importanceDots(task.importance);

    card.innerHTML = `
        <div class="card-header">
            <span class="card-importance">${dots}</span>
            <button class="card-delete" title="Delete">×</button>
        </div>
        <div class="card-content">${escapeHtml(task.content)}</div>
    `;

    card.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text/plain', task.id);
        e.dataTransfer.effectAllowed = 'move';
        requestAnimationFrame(() => card.classList.add('dragging'));
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));

    card.querySelector('.card-delete').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm('Delete this task?')) return;
        try {
            await fetch(`/api/knots?id=${encodeURIComponent(task.id)}`, { method: 'DELETE' });
            loadKanban();
        } catch (err) {
            console.error('delete error:', err);
        }
    });

    return card;
}

// --- Drag and drop on columns ---

kanbanBoard.querySelectorAll('.kanban-column').forEach(column => {
    let dragCounter = 0;
    const dropZone = column.querySelector('.kanban-cards');

    column.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
    });

    column.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragCounter++;
        dropZone.classList.add('drag-over');
    });

    column.addEventListener('dragleave', () => {
        dragCounter--;
        if (dragCounter === 0) dropZone.classList.remove('drag-over');
    });

    column.addEventListener('drop', async (e) => {
        e.preventDefault();
        dragCounter = 0;
        dropZone.classList.remove('drag-over');
        const taskId = e.dataTransfer.getData('text/plain');
        const newStatus = column.dataset.status;

        try {
            await fetch('/api/knots', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: taskId, status: newStatus })
            });
            loadKanban();
        } catch (err) {
            console.error('status update error:', err);
        }
    });
});

// --- Todo list ---

todoToggle.addEventListener('click', () => {
    todoVisible = !todoVisible;
    todoList.classList.toggle('visible', todoVisible);
    kanbanBoard.classList.toggle('hidden', todoVisible);
    todoToggle.classList.toggle('active', todoVisible);
    if (todoVisible) loadTodo();
    else loadKanban();
});

async function loadTodo() {
    try {
        const res = await fetch('/api/knots?type=task&limit=200');
        const tasks = await res.json();
        if (!tasks) return;

        todoList.querySelectorAll('.todo-items').forEach(el => el.innerHTML = '');

        tasks.forEach(task => {
            const status = task.status || 'todo';
            if (status !== 'todo' && status !== 'in_progress') return;
            const section = todoList.querySelector(`.todo-section[data-status="${status}"] .todo-items`);
            if (section) section.appendChild(createTodoItem(task));
        });

        todoList.querySelectorAll('.todo-section').forEach(sec => {
            const count = sec.querySelector('.todo-items').children.length;
            sec.querySelector('.todo-section-count').textContent = count;
        });
    } catch (e) {
        console.error('todo load error:', e);
    }
}

function createTodoItem(task) {
    const item = document.createElement('div');
    item.className = 'todo-item';

    const dots = importanceDots(task.importance);
    const status = task.status || 'todo';

    item.innerHTML = `
        <span class="status-dot ${status}"></span>
        <span class="todo-text">${escapeHtml(task.content)}</span>
        <span class="card-importance">${dots}</span>
    `;

    item.addEventListener('click', (e) => {
        if (e.target.closest('.status-picker')) return;
        closeAllPickers();
        const picker = document.createElement('div');
        picker.className = 'status-picker';
        picker.innerHTML = [
            ['todo', 'To Do'],
            ['in_progress', 'In Progress'],
            ['waiting', 'Waiting'],
            ['done', 'Done'],
        ].map(([val, label]) =>
            `<button class="sp-btn ${val === status ? 'current' : ''}" data-status="${val}"><span class="status-dot ${val}"></span>${label}</button>`
        ).join('');

        picker.addEventListener('click', async (pe) => {
            const btn = pe.target.closest('.sp-btn');
            if (!btn) return;
            const newStatus = btn.dataset.status;
            picker.remove();
            if (newStatus === status) return;
            try {
                await fetch('/api/knots', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: task.id, status: newStatus })
                });
                loadTodo();
            } catch (err) {
                console.error('status error:', err);
            }
        });

        item.appendChild(picker);
    });

    return item;
}

function closeAllPickers() {
    document.querySelectorAll('.status-picker').forEach(p => p.remove());
}

// --- Utility ---

function importanceDots(n) {
    return '●'.repeat(n) + '○'.repeat(5 - n);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeAllPickers();
        closeAddPopup();
        if (todoVisible) {
            todoVisible = false;
            todoList.classList.remove('visible');
            kanbanBoard.classList.remove('hidden');
            todoToggle.classList.remove('active');
            loadKanban();
        }
    }
});

document.addEventListener('click', (e) => {
    if (!e.target.closest('.todo-item')) closeAllPickers();
    if (!e.target.closest('.add-popup') && !e.target.closest('#add-btn')) closeAddPopup();
});

// --- Init ---

loadKanban();
</script>
</body>
</html>
