services:
  nodino-mcp:
    build: ./nodino-mcp
    restart: unless-stopped
    environment:
      NODINO_URL: "http://host.docker.internal:8085"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8003"
    ports:
      - "8003:8003"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8890:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
