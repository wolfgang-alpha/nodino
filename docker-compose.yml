services:
  chroma:
    image: chromadb/chroma:0.6.3
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - ./mempalace-data/chroma:/data

  mempalace-api:
    build: ./mempalace
    restart: unless-stopped
    depends_on:
      - chroma
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      HOME: /data
    volumes:
      - ./mempalace-data:/data
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  mempalace-mcp:
    build: ./mempalace-mcp
    restart: unless-stopped
    depends_on:
      mempalace-api:
        condition: service_healthy
    environment:
      MEMPALACE_URL: "http://mempalace-api:8000"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8001"
    ports:
      - "8001:8001"

  whisper:
    build: ./whisper
    restart: unless-stopped
    ports:
      - "9001:5001"

  piper:
    build: ./piper
    restart: unless-stopped
    environment:
      PIPER_VOICE: en_US-lessac-medium
    ports:
      - "9000:5000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8889:80"
      - "8890:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
