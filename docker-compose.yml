services:
  chroma:
    image: chromadb/chroma:0.6.3
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - ./mempalace-data/chroma:/data

  mempalace-api:
    build: ./mempalace
    restart: unless-stopped
    depends_on:
      - chroma
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      HOME: /data
    volumes:
      - ./mempalace-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  whisper:
    build: ./whisper
    restart: unless-stopped

  piper:
    build: ./piper
    restart: unless-stopped
    environment:
      PIPER_VOICE: en_US-lessac-medium

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mempalace-api:
        condition: service_healthy
    environment:
      OLLAMA_URL: "http://192.168.0.132:11434"
      OLLAMA_MODEL: "devstral-2:123b-cloud"
      MEMPALACE_URL: "http://mempalace-api:8000"
      WHISPER_URL: "http://whisper:5001"
      PIPER_URL: "http://piper:5000"
      CAL_DAV: "${CAL_DAV}"
      NEXTCLOUD_USER: "${NEXTCLOUD_USER}"
      NEXTCLOUD_PASSWORD: "${NEXTCLOUD_PASSWORD}"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8889:80"
      - "8890:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
