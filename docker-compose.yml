services:
  whisper:
    build: ./whisper
    restart: unless-stopped
    ports:
      - "9001:5001"

  piper:
    build: ./piper
    restart: unless-stopped
    environment:
      PIPER_VOICE: en_US-lessac-medium
    ports:
      - "9000:5000"

  nodino-mcp:
    build: ./nodino-mcp
    restart: unless-stopped
    environment:
      NODINO_URL: "http://host.docker.internal:8085"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8003"
    ports:
      - "8003:8003"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8889:80"
      - "8890:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
